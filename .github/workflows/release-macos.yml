name: Release (macOS)

# Builds the Apple-Silicon .dmg and attaches it to the GitHub Release when a
# version tag is pushed. Runs on push of tags like v0.3.0, or manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dmg:
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build .dmg
        env:
          # To ship a signed + notarized build, add these repo secrets and the
          # matching steps: SIGN_ID plus AC_* notarytool credentials.
          SIGN_ID: ${{ secrets.MACOS_SIGN_ID != '' && secrets.MACOS_SIGN_ID || '-' }}
        run: |
          cargo build --release -p whisper-catch
          packaging/macos/build-dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisprcatch-macos-arm64
          path: dist/*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          fail_on_unmatched_files: true
