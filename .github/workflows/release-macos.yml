name: Release

# Builds the macOS (Apple Silicon) .dmg and the Linux .deb and attaches both to
# the GitHub Release when a version tag is pushed. Also runnable manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build .dmg
        env:
          # To ship a signed + notarized build, add secrets and matching steps:
          # MACOS_SIGN_ID plus AC_* notarytool credentials.
          SIGN_ID: ${{ secrets.MACOS_SIGN_ID != '' && secrets.MACOS_SIGN_ID || '-' }}
        run: |
          cargo build --release -p whisper-catch
          packaging/macos/build-dmg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: whisprcatch-macos-arm64
          path: dist/*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          fail_on_unmatched_files: true

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y cmake clang libasound2-dev

      - name: Build .deb
        run: |
          cargo install cargo-deb --locked
          (cd apps/cli && cargo deb)   # builds the release binary + packages it
          mkdir -p dist
          cp target/debian/*.deb dist/whisper-catch_amd64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: whisprcatch-linux-amd64
          path: dist/*.deb

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          fail_on_unmatched_files: true
