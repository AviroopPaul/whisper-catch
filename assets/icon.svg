<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- WhisprCatch app icon: microphone whose capsule carries a soundwave (level bars),
       pickup arc reads as the "catch". Teal family per docs/DESIGN.md, no neon. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#152029"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.65">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mic" x1="256" y1="96" x2="256" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6ff0dc"/>
      <stop offset="1" stop-color="#1caf98"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="114.5" fill="none" stroke="#5eead4" stroke-opacity="0.10" stroke-width="3"/>
  <g transform="translate(256 252) scale(1.09) translate(-256 -252)">
    <!-- capsule -->
    <rect x="206" y="98" width="100" height="176" rx="50" fill="url(#mic)"/>
    <!-- soundwave bars cut into the capsule -->
    <rect x="227" y="164" width="12" height="44" rx="6" fill="#0b0e14"/>
    <rect x="250" y="148" width="12" height="76" rx="6" fill="#0b0e14"/>
    <rect x="273" y="164" width="12" height="44" rx="6" fill="#0b0e14"/>
    <!-- pickup arc (the catch) + stem -->
    <path d="M154 222v22a102 102 0 0 0 204 0v-22" fill="none" stroke="url(#mic)" stroke-width="32" stroke-linecap="round"/>
    <path d="M256 346v40" fill="none" stroke="url(#mic)" stroke-width="32" stroke-linecap="round"/>
  </g>
</svg>
